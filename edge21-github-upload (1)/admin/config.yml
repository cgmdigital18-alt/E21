backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

site_url: https://zippy-medovik-ba90bc.netlify.app

collections:

  - name: "settings"
    label: "Site Settings"
    files:

      - name: "popup"
        label: "Popup Freebie"
        file: "admin/popup-settings.json"
        fields:
          - { label: "Popup Heading", name: "heading", widget: "string" }
          - { label: "Popup Subtext", name: "subtext", widget: "text" }
          - { label: "Flodesk Form ID", name: "form_id", widget: "string" }
          - { label: "CTA Button Text", name: "cta_text", widget: "string" }
          - { label: "Fine Print", name: "note", widget: "string" }
          - { label: "Show Popup?", name: "enabled", widget: "boolean", default: true }

  - name: "pages"
    label: "Pages"
    files:

      - name: "homepage"
        label: "Home Page"
        file: "admin/content-home.json"
        fields:
          - { label: "Hero Tag Line", name: "hero_tag", widget: "string" }
          - { label: "Hero Headline", name: "hero_headline", widget: "string" }
          - { label: "Hero Subtext", name: "hero_subtext", widget: "text" }
          - { label: "CTA Button Text", name: "hero_cta_primary_text", widget: "string" }
          - { label: "CTA Button Link", name: "hero_cta_primary_link", widget: "string" }
          - { label: "Secondary Button Text", name: "hero_cta_secondary_text", widget: "string" }
          - { label: "Secondary Button Link", name: "hero_cta_secondary_link", widget: "string" }
          - { label: "Callout Headline", name: "callout_headline", widget: "string" }
          - { label: "Callout Text", name: "callout_text", widget: "text" }
          - { label: "Callout CTA Text", name: "callout_cta_text", widget: "string" }
          - { label: "Bottom Banner Headline", name: "cta_banner_headline", widget: "string" }
          - { label: "Bottom Banner Text", name: "cta_banner_text", widget: "text" }

      - name: "about"
        label: "About Page"
        file: "admin/content-about.json"
        fields:
          - { label: "Page Headline", name: "page_headline", widget: "string" }
          - { label: "Page Subtitle", name: "page_subtitle", widget: "text" }
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Bio Headline", name: "bio_headline", widget: "string" }
          - { label: "Bio Paragraph 1", name: "bio_p1", widget: "text" }
          - { label: "Bio Paragraph 2", name: "bio_p2", widget: "text" }
          - { label: "Bio Paragraph 3", name: "bio_p3", widget: "text" }
          - { label: "Bio Paragraph 4", name: "bio_p4", widget: "text" }
          - { label: "CTA Headline", name: "cta_headline", widget: "string" }
          - { label: "CTA Text", name: "cta_text", widget: "text" }

      - name: "services"
        label: "Services Page"
        file: "admin/content-services.json"
        fields:
          - { label: "Page Headline", name: "page_headline", widget: "string" }
          - { label: "Page Subtitle", name: "page_subtitle", widget: "text" }
          - { label: "Service 1 Title", name: "service1_title", widget: "string" }
          - { label: "Service 1 Description", name: "service1_desc", widget: "text" }
          - { label: "Service 1 Price", name: "service1_price", widget: "string" }
          - { label: "Service 1 Price Note", name: "service1_price_note", widget: "string" }
          - { label: "Service 2 Title", name: "service2_title", widget: "string" }
          - { label: "Service 2 Description", name: "service2_desc", widget: "text" }
          - { label: "Service 2 Price", name: "service2_price", widget: "string" }
          - { label: "Service 2 Price Note", name: "service2_price_note", widget: "string" }
          - { label: "Service 3 Title", name: "service3_title", widget: "string" }
          - { label: "Service 3 Description", name: "service3_desc", widget: "text" }
          - { label: "Service 3 Price", name: "service3_price", widget: "string" }
          - { label: "Service 3 Price Note", name: "service3_price_note", widget: "string" }

      - name: "contact"
        label: "Contact Page"
        file: "admin/content-contact.json"
        fields:
          - { label: "Page Headline", name: "page_headline", widget: "string" }
          - { label: "Page Subtitle", name: "page_subtitle", widget: "text" }
          - { label: "Info Headline", name: "info_headline", widget: "string" }
          - { label: "Info Text 1", name: "info_text1", widget: "text" }
          - { label: "Info Text 2", name: "info_text2", widget: "text" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Response Time Note", name: "response_time", widget: "string" }
